<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Local Blockly Library -->
    <script src="script/vendor/blockly_compressed.js"></script>
    <script src="script/vendor/blocks_compressed.js"></script>
    <script src="script/vendor/javascript_compressed.js"></script>
    <script src="script/vendor/ja.js"></script>
</head>

<body>
    <header>
        <h1>AIと遊ぼう！バイブコーディング体験 🎮</h1>
    </header>

    <main>
        <div id="blockly-div">
            <!-- Blockly workspace will be injected here -->
        </div>

        <div id="top-ui">
            <div id="preview-area">
                <div class="preview-label">STAGE 1: JUMP OVER THE ROCK</div>
                <div id="game-world">
                    <div id="goal">🏁</div>
                    <div id="rock">🪨</div>
                    <div id="player">🏃</div>
                </div>
            </div>
            <button id="run-button">
                <span class="icon">▶</span> 実行する
            </button>
        </div>

        <div id="ai-side-panel">
            <div class="panel-header">AI THINKING PROCESS</div>
            <div id="ai-log">
                <div class="log-entry">Waiting for instructions...</div>
            </div>
            <div id="vibe-input-container">
                <input type="text" id="vibe-input" placeholder="AIに指示を出す（例：ジャンプして、120でジャンプして）">
                <button id="vibe-btn">VIBE!</button>
            </div>
            <div id="ai-chara-container">
                <img src="assets/chara.svg" id="ai-chara" alt="AI Character">
                <div class="speech-bubble">どうすればいいかな？</div>
            </div>
        </div>

        <!-- AIの「手」アニメーション用コンテナ -->
        <div id="hand-container">
            <div id="ai-hand">✋</div>
        </div>
    </main>

    <!-- Blockly Toolbox XML -->
    <xml id="toolbox" style="display: none">
        <category name="イベント" colour="60">
            <block type="when_run"></block>
        </category>
        <category name="アクション" colour="20">
            <block type="move_forward"></block>
            <block type="jump">
                <value name="HEIGHT">
                    <shadow type="math_number">
                        <field name="NUM">100</field>
                    </shadow>
                </value>
            </block>
        </category>
        <category name="論理" colour="%{BKY_LOGIC_HUE}">
            <block type="controls_if"></block>
            <block type="logic_compare"></block>
            <block type="logic_operation"></block>
            <block type="logic_negate"></block>
            <block type="logic_boolean"></block>
        </category>
        <category name="ループ" colour="%{BKY_LOOPS_HUE}">
            <block type="controls_repeat_ext">
                <value name="TIMES">
                    <shadow type="math_number">
                        <field name="NUM">10</field>
                    </shadow>
                </value>
            </block>
            <block type="controls_whileUntil"></block>
        </category>
        <category name="数学" colour="%{BKY_MATH_HUE}">
            <block type="math_number">
                <field name="NUM">123</field>
            </block>
            <block type="math_arithmetic"></block>
            <block type="math_single"></block>
        </category>
        <category name="テキスト" colour="%{BKY_TEXTS_HUE}">
            <block type="text"></block>
            <block type="text_print"></block>
        </category>
        <!-- 変数カテゴリ（変数の作成や設定を自動生成） -->
        <category name="変数" colour="%{BKY_VARIABLES_HUE}" custom="VARIABLE"></category>

        <!-- 関数カテゴリ（関数の定義や呼び出しを自動生成） -->
        <category name="関数" colour="%{BKY_PROCEDURES_HUE}" custom="PROCEDURE"></category>

        <!-- リスト（配列）カテゴリ -->
        <category name="リスト" colour="%{BKY_LISTS_HUE}">
            <block type="lists_create_empty"></block>
            <block type="lists_create_with"></block>
            <block type="lists_repeat">
                <value name="NUM">
                    <shadow type="math_number">
                        <field name="NUM">5</field>
                    </shadow>
                </value>
            </block>
            <block type="lists_length"></block>
            <block type="lists_isEmpty"></block>
        </category>

        <!-- 色カテゴリ（UIやゲームの表現に便利） -->
        <category name="色" colour="%{BKY_COLOUR_HUE}">
            <block type="colour_picker"></block>
            <block type="colour_random"></block>
            <block type="colour_rgb">
                <value name="RED">
                    <shadow type="math_number">
                        <field name="NUM">100</field>
                    </shadow>
                </value>
                <value name="GREEN">
                    <shadow type="math_number">
                        <field name="NUM">50</field>
                    </shadow>
                </value>
                <value name="BLUE">
                    <shadow type="math_number">
                        <field name="NUM">0</field>
                    </shadow>
                </value>
            </block>
        </category>
    </xml>

    <script src="script/main.js"></script>
</body>

</html>
